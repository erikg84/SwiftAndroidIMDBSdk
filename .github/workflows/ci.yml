name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Swift Package (iOS / macOS) ──────────────────────────────────────────────
  swift-build-test:
    name: Build & Test (Swift Package)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

  # ── Validate android/Package.swift resolves ──────────────────────────────────
  validate-android-manifest:
    name: Validate Android Package.swift
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift toolchain
        uses: actions/cache@v4
        with:
          path: /tmp/swift-6.3
          key: swift-6.3-ubuntu24

      - name: Install Swift 6.3
        run: |
          if [ ! -d /tmp/swift-6.3 ]; then
            curl -fsSL "https://download.swift.org/swift-6.3-release/ubuntu2404/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04.tar.gz" -o /tmp/swift.tar.gz
            mkdir -p /tmp/swift-6.3
            tar xzf /tmp/swift.tar.gz -C /tmp/swift-6.3 --strip-components=1
          fi
          echo "/tmp/swift-6.3/usr/bin" >> $GITHUB_PATH

      - name: Resolve android/Package.swift
        working-directory: android
        run: swift package resolve
