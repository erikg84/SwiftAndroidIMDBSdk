name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0). Used as the GitHub Release tag if not already set.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

# Self-hosted Mac Studio runner (ARM64, M1 Max, all Swift+Android toolchain
# pre-installed). The runner is registered to this repo with labels:
#   self-hosted, macOS, ARM64, mac-studio, swift-android
#
# Toolchain on the runner (verified 2026-04-10):
#   - Swift 6.3 + Android SDK bundle (`swift sdk list` shows swift-6.3-RELEASE_android)
#   - Android NDK 28.2.13676358 at ~/Library/Android/sdk/ndk/
#   - JDK 17 (Microsoft) and JDK 21 (Corretto) at ~/Library/Java/JavaVirtualMachines/
#   - Gradle (system, /opt/homebrew/bin/gradle)
#   - Xcode 16.x for the iOS XCFramework job
#
# The hosted-runner version of this workflow used JDK 25 because swift-java
# hardcodes that version in its build files. publish-local.sh works around it
# by patching swift-java's hardcoded JavaLanguageVersion at bootstrap time, and
# we use the same trick here. JDK 21 is then used for the actual Gradle build,
# which is compatible with Gradle 8.11.1 and AGP 8.7.3.

jobs:
  build-aar:
    name: Build Android AAR
    runs-on: [self-hosted, mac-studio]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history if release.sh wants to compare against previous tags

      - name: Inspect runner state
        run: |
          echo "── Runner ──"
          echo "Hostname: $(hostname)"
          echo "OS:       $(sw_vers -productName) $(sw_vers -productVersion)"
          echo "Arch:     $(uname -m)"
          echo
          echo "── Java toolchains ──"
          /usr/libexec/java_home -V 2>&1 || true
          echo
          echo "── Swift ──"
          /opt/homebrew/bin/swift --version 2>&1 || swift --version || true
          /opt/homebrew/bin/swift sdk list 2>&1 || swift sdk list || true
          echo
          echo "── Gradle ──"
          /opt/homebrew/bin/gradle --version 2>&1 | head -5 || gradle --version | head -5 || true
          echo
          echo "── Android NDK ──"
          ls ~/Library/Android/sdk/ndk/ 2>/dev/null || true

      - name: Configure environment (JDK 21 + Android NDK + Swift)
        run: |
          # JDK 21 (Corretto) — compatible with Gradle 8.11.1 + AGP 8.7.3
          JDK21="$(/usr/libexec/java_home -v 21 2>/dev/null)"
          if [[ -z "$JDK21" ]]; then
            echo "ERROR: JDK 21 not found via java_home -v 21"
            /usr/libexec/java_home -V 2>&1 || true
            exit 1
          fi
          echo "JAVA_HOME=$JDK21" >> "$GITHUB_ENV"
          echo "$JDK21/bin" >> "$GITHUB_PATH"

          # Android NDK — pick the highest installed version
          NDK_DIR=$(ls -d ~/Library/Android/sdk/ndk/* 2>/dev/null | sort -V | tail -1)
          if [[ -n "$NDK_DIR" ]]; then
            echo "ANDROID_NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"
            echo "ANDROID_NDK_ROOT=$NDK_DIR" >> "$GITHUB_ENV"
          fi

          # Homebrew bin (gradle, swift, etc.) on PATH
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - name: Verify Swift Android SDK is installed on runner
        run: |
          if ! swift sdk list 2>&1 | grep -q 'swift-6.3-RELEASE_android'; then
            echo "ERROR: swift-6.3-RELEASE_android SDK not installed on runner"
            echo "Run on Mac Studio:"
            echo "  swift sdk install https://download.swift.org/swift-6.3-release/android-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_android.artifactbundle.tar.gz \\"
            echo "    --checksum 2f2942c4bcea7965a08665206212c66991dabe23725aeec7c4365fc91acad088"
            exit 1
          fi
          swift sdk list

      - name: Override version (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          sed -i.bak "s/^VERSION_NAME=.*/VERSION_NAME=${{ inputs.version }}/" android/gradle.properties
          rm -f android/gradle.properties.bak
          echo "Overrode VERSION_NAME → ${{ inputs.version }}"
          grep VERSION_NAME android/gradle.properties

      - name: Resolve swift-java SPM dependency
        working-directory: android
        run: swift package resolve

      - name: Bootstrap swiftkit-core → Maven Local (with JDK patching)
        # swift-java's SwiftKitCore module hardcodes Java 25 in two places:
        #   - BuildLogic/src/main/kotlin/build-logic.java-common-conventions.gradle.kts
        #   - SwiftKitCore/build.gradle.kts (overrides the convention)
        # The resulting JAR is functionally identical regardless of which JDK
        # compiles it; the gate is only a toolchain requirement check. We patch
        # both files to use the JDK we have (21) before invoking publishToMavenLocal.
        # This is the same approach scripts/publish-local.sh uses locally.
        run: |
          set -euo pipefail
          MARKER="$HOME/.m2/repository/org/swift/swiftkit/swiftkit-core"
          if [[ -d "$MARKER" ]]; then
            echo "swiftkit-core already in Maven Local — skipping bootstrap"
            ls -la "$MARKER"
            exit 0
          fi

          SWIFT_JAVA_DIR=$(find android/.build/checkouts -maxdepth 2 -name "swift-java*" -type d 2>/dev/null | head -1)
          if [[ -z "$SWIFT_JAVA_DIR" ]]; then
            echo "ERROR: swift-java checkout not found under android/.build/checkouts/"
            find android/.build -maxdepth 4 -type d -name 'swift-java*' 2>/dev/null || true
            exit 1
          fi
          echo "swift-java checkout: $SWIFT_JAVA_DIR"

          JAVA_MAJOR=$(java -version 2>&1 | awk -F '"' '/version/ {print $2}' | cut -d. -f1)
          echo "Patching swift-java to use JDK $JAVA_MAJOR"

          CONV="$SWIFT_JAVA_DIR/BuildLogic/src/main/kotlin/build-logic.java-common-conventions.gradle.kts"
          if [[ -f "$CONV" ]]; then
            sed -i.bak "s/JavaLanguageVersion\\.of([0-9]*)/JavaLanguageVersion.of($JAVA_MAJOR)/g" "$CONV"
            grep JavaLanguageVersion "$CONV" || true
          fi

          CORE="$SWIFT_JAVA_DIR/SwiftKitCore/build.gradle.kts"
          if [[ -f "$CORE" ]]; then
            sed -i.bak "s/JavaLanguageVersion\\.of([0-9]*)/JavaLanguageVersion.of($JAVA_MAJOR)/g" "$CORE"
            grep JavaLanguageVersion "$CORE" || true
          fi

          # Clear stale BuildLogic build cache so the patches actually apply
          rm -rf "$SWIFT_JAVA_DIR/BuildLogic/build"
          rm -rf "$SWIFT_JAVA_DIR/.gradle"

          echo "Running :SwiftKitCore:publishToMavenLocal..."
          (cd "$SWIFT_JAVA_DIR" && \
              ./gradlew :SwiftKitCore:publishToMavenLocal \
                  -PskipSamples=true \
                  --no-daemon)

          echo "Verifying swiftkit-core in ~/.m2:"
          ls -la "$MARKER" || { echo "ERROR: bootstrap did not produce $MARKER"; exit 1; }

      - name: Build Android AAR (assembleRelease)
        working-directory: android
        run: |
          set -euo pipefail
          # Use the project's gradle wrapper if it exists, else system gradle
          if [[ -x ./gradlew ]]; then
            GRADLE=./gradlew
          else
            GRADLE=/opt/homebrew/bin/gradle
          fi
          echo "Using: $GRADLE"
          $GRADLE assembleRelease --no-daemon --stacktrace

          AAR=$(find build/outputs/aar -name "*-release.aar" 2>/dev/null | head -1)
          if [[ -z "$AAR" ]]; then
            echo "ERROR: release AAR not found"
            find build -name '*.aar' 2>/dev/null || true
            exit 1
          fi
          echo "Built: $AAR ($(du -sh "$AAR" | cut -f1))"

      - name: Locate and rename AAR for upload
        id: aar
        run: |
          AAR=$(find android/build/outputs/aar -name "*-release.aar" | head -1)
          if [[ -z "$AAR" ]]; then
            echo "ERROR: Release AAR not found after build"
            exit 1
          fi
          # Tag (push) or workflow_dispatch input → file name
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == "main" || -z "$TAG" ]]; then
            TAG="${{ inputs.version }}"
            [[ -z "$TAG" ]] && TAG="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          DEST="SwiftAndroidSDK-${TAG}.aar"
          cp "$AAR" "$DEST"
          shasum -a 256 "$DEST" > "${DEST}.sha256"
          ls -lh "$DEST" "${DEST}.sha256"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "shasum_path=${DEST}.sha256" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: aar
          path: |
            ${{ steps.aar.outputs.path }}
            ${{ steps.aar.outputs.shasum_path }}
          if-no-files-found: error

  build-xcframework:
    name: Build XCFramework
    runs-on: [self-hosted, mac-studio]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Inspect Xcode
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Override version (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          sed -i.bak "s/^VERSION_NAME=.*/VERSION_NAME=${{ inputs.version }}/" android/gradle.properties
          rm -f android/gradle.properties.bak

      - name: Build XCFramework
        # scripts/build-xcframework.sh archives each platform, reassembles a
        # static framework from the .o files + DerivedData swiftmodule, and
        # wraps the three frameworks with `xcodebuild -create-xcframework`.
        # See the script header for why we don't use the SwiftPM scheme directly.
        run: bash scripts/build-xcframework.sh "$RUNNER_TEMP/xcframework"

      - name: Read checksum + tag
        id: checksum
        run: |
          CHECKSUM=$(cat "$RUNNER_TEMP/xcframework/SwiftAndroidSDK.xcframework.sha256")
          echo "value=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "$CHECKSUM" > "$RUNNER_TEMP/xcframework/xcframework.checksum"
          ls -lh "$RUNNER_TEMP/xcframework/"

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcframework
          path: |
            ${{ runner.temp }}/xcframework/SwiftAndroidSDK.xcframework.zip
            ${{ runner.temp }}/xcframework/xcframework.checksum
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-aar, build-xcframework]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest   # GitHub-hosted is fine here — no toolchain needed
    steps:
      - uses: actions/checkout@v4

      - name: Download AAR artifact
        uses: actions/download-artifact@v4
        with:
          name: aar
          path: artifacts

      - name: Download XCFramework artifact (if available)
        id: dl-xcf
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: xcframework
          path: artifacts

      - name: Read XCFramework checksum (if built)
        id: checksum
        run: |
          if [[ -f artifacts/xcframework.checksum ]]; then
            echo "value=$(cat artifacts/xcframework.checksum)" >> "$GITHUB_OUTPUT"
          else
            echo "value=not-built" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SwiftAndroidSDK ${{ github.ref_name }}
          body: |
            ## SwiftAndroidSDK ${{ github.ref_name }}

            ### iOS — Swift Package Manager (source, recommended)
            ```swift
            .package(url: "https://github.com/erikg84/SwiftAndroidIMDBSdk", from: "${{ github.ref_name }}")
            ```

            ### iOS — Binary XCFramework
            ```swift
            .binaryTarget(
                name: "SwiftAndroidSDK",
                url: "https://github.com/erikg84/SwiftAndroidIMDBSdk/releases/download/${{ github.ref_name }}/SwiftAndroidSDK.xcframework.zip",
                checksum: "${{ steps.checksum.outputs.value }}"
            )
            ```

            ### Android — Gradle (AAR via local file)
            Copy the `.aar` from this release into your `app/libs/`, then:
            ```groovy
            dependencies {
                implementation fileTree(dir: 'libs', include: ['*.aar'])
            }
            ```
          files: |
            artifacts/*.aar
            artifacts/*.aar.sha256
            artifacts/*.zip
          generate_release_notes: true
