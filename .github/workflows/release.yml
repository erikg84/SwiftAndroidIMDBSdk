name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── XCFramework (iOS + macOS) ────────────────────────────────────────────────
  build-xcframework:
    name: Build XCFramework
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Archive — iOS device
        run: |
          xcodebuild archive \
            -scheme SwiftAndroidSDK \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/ios.xcarchive" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

      - name: Archive — iOS Simulator
        run: |
          xcodebuild archive \
            -scheme SwiftAndroidSDK \
            -destination "generic/platform=iOS Simulator" \
            -archivePath "$RUNNER_TEMP/ios-sim.xcarchive" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

      - name: Archive — macOS
        run: |
          xcodebuild archive \
            -scheme SwiftAndroidSDK \
            -destination "generic/platform=macOS" \
            -archivePath "$RUNNER_TEMP/macos.xcarchive" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

      - name: Create XCFramework
        run: |
          xcodebuild -create-xcframework \
            -framework "$RUNNER_TEMP/ios.xcarchive/Products/usr/local/lib/SwiftAndroidSDK.framework" \
            -framework "$RUNNER_TEMP/ios-sim.xcarchive/Products/usr/local/lib/SwiftAndroidSDK.framework" \
            -framework "$RUNNER_TEMP/macos.xcarchive/Products/usr/local/lib/SwiftAndroidSDK.framework" \
            -output "$RUNNER_TEMP/SwiftAndroidSDK.xcframework"

      - name: Zip XCFramework
        run: |
          cd "$RUNNER_TEMP"
          zip -r SwiftAndroidSDK.xcframework.zip SwiftAndroidSDK.xcframework

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum "$RUNNER_TEMP/SwiftAndroidSDK.xcframework.zip")
          echo "value=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcframework
          path: ${{ runner.temp }}/SwiftAndroidSDK.xcframework.zip

      - name: Save checksum to file
        run: echo "${{ steps.checksum.outputs.value }}" > "$RUNNER_TEMP/xcframework.checksum"

      - name: Upload checksum file
        uses: actions/upload-artifact@v4
        with:
          name: xcframework-checksum
          path: ${{ runner.temp }}/xcframework.checksum

  # ── Android AAR ──────────────────────────────────────────────────────────────
  build-aar:
    name: Build Android AAR
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Swift toolchain
        uses: actions/cache@v4
        with:
          path: /tmp/swift-6.3
          key: swift-6.3-ubuntu24

      - name: Install Swift 6.3
        run: |
          if [ ! -d /tmp/swift-6.3 ]; then
            curl -fsSL "https://download.swift.org/swift-6.3-release/ubuntu2404/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04.tar.gz" -o /tmp/swift.tar.gz
            mkdir -p /tmp/swift-6.3
            tar xzf /tmp/swift.tar.gz -C /tmp/swift-6.3 --strip-components=1
          fi
          echo "/tmp/swift-6.3/usr/bin" >> $GITHUB_PATH

      - name: Cache Swift Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.swiftpm/swift-sdks
          key: swift-android-sdk-6.3

      - name: Install Swift Android SDK
        run: |
          swift sdk install \
            "https://download.swift.org/swift-6.3-release/android-sdk/swift-6.3-RELEASE_android.artifactbundle.tar.gz"
        # NOTE: If the above URL 404s, check https://www.swift.org/install/linux/tarball/
        # and update to the current android SDK artifact bundle URL + add --checksum

      - name: Setup Android NDK r27
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          accept-android-sdk-licenses: true

      - name: Install NDK r27d
        run: sdkmanager "ndk;27.2.12479018"

      - name: Cache Maven Local (swift-java bootstrap)
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/swift-java
          key: swift-java-bootstrap-${{ hashFiles('android/Package.swift') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/build.gradle', 'android/settings.gradle') }}
          restore-keys: gradle-

      - name: Resolve Swift packages
        working-directory: android
        run: swift package resolve

      - name: Bootstrap swift-java → Maven Local
        working-directory: android
        run: |
          SWIFT_JAVA_DIR=$(swift package show-dependencies --format json \
            | python3 -c "import json,sys; deps=json.load(sys.stdin)['dependencies']; \
              [print(d['path']) for d in deps if 'swift-java' in d['identity']]" 2>/dev/null \
            || find .build/checkouts -maxdepth 1 -name "swift-java*" -type d | head -1)
          echo "swift-java checkout: $SWIFT_JAVA_DIR"
          cd "$SWIFT_JAVA_DIR" && ./gradlew publishToMavenLocal --no-daemon

      - name: Build AAR
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Locate and rename AAR
        id: aar
        run: |
          AAR=$(find android/build -name "*-release.aar" | head -1)
          echo "Found: $AAR"
          TAG=${{ github.ref_name }}
          DEST="SwiftAndroidSDK-${TAG}.aar"
          cp "$AAR" "$DEST"
          echo "path=$DEST" >> $GITHUB_OUTPUT

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: aar
          path: ${{ steps.aar.outputs.path }}

  # ── Create GitHub Release ────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-xcframework, build-aar]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download XCFramework
        uses: actions/download-artifact@v4
        with:
          name: xcframework
          path: artifacts

      - name: Download AAR
        uses: actions/download-artifact@v4
        with:
          name: aar
          path: artifacts

      - name: Download checksum
        uses: actions/download-artifact@v4
        with:
          name: xcframework-checksum
          path: artifacts

      - name: Read checksum
        id: checksum
        run: echo "value=$(cat artifacts/xcframework.checksum)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SwiftAndroidSDK ${{ github.ref_name }}
          body: |
            ## SwiftAndroidSDK ${{ github.ref_name }}

            ### iOS — Swift Package Manager (source, recommended)
            In `Package.swift`:
            ```swift
            .package(url: "https://github.com/YOUR_ORG/SwiftAndroidSDK", from: "${{ github.ref_name }}")
            ```

            ### iOS — Binary XCFramework
            ```swift
            .binaryTarget(
                name: "SwiftAndroidSDK",
                url: "https://github.com/YOUR_ORG/SwiftAndroidSDK/releases/download/${{ github.ref_name }}/SwiftAndroidSDK.xcframework.zip",
                checksum: "${{ steps.checksum.outputs.value }}"
            )
            ```

            ### Android — Gradle
            ```groovy
            implementation 'YOUR_ORG:SwiftAndroidSDK:${{ github.ref_name }}'
            ```
            Or add the AAR from this release directly:
            ```groovy
            implementation files('libs/SwiftAndroidSDK-${{ github.ref_name }}.aar')
            ```
          files: |
            artifacts/SwiftAndroidSDK.xcframework.zip
            artifacts/SwiftAndroidSDK-${{ github.ref_name }}.aar
          generate_release_notes: true
